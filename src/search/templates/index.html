<!DOCTYPE html>
<html>

<head>
    <title>Поиск товаров</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2em;
        }

        input {
            width: 300px;
            padding: 5px;
        }

        button {
            padding: 5px 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
            padding: 8px;
            background: #f0f0f0;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Поиск товаров</h1>
    <form method="post">
        <input type="text" name="query" placeholder="Введите запрос..." value="{{ query }}">
        <button type="submit">Найти</button>
    </form>

    {% if results %}
    <h2>Результаты поиска:</h2>
    <ul>
        {% for product in results %}
        <li>{{ product }}</li>
        {% endfor %}
    </ul>
    {% elif query %}
    <p>Ничего не найдено.</p>
    {% endif %}
</body>

</html>
