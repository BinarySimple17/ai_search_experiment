version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pgvector_local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: products
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data